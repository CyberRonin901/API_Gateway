services:
  postgres:
    image: postgres:17-alpine
    container_name: api-gateway-postgres
    environment:
      POSTGRES_DB: AuthServiceDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./AuthService/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d AuthServiceDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-gateway-network

  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-gateway-network

  discovery-service:
    build:
      context: .
      args:
        SERVICE_PATH: ./DiscoveryService
    container_name: discovery-service
    environment:
      - SERVER_PORT=8761
      - EUREKA_INSTANCE_HOSTNAME=discovery-service
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - api-gateway-network

  # App Services
  auth-service:
    build:
      context: .
      args:
        SERVICE_PATH: ./AuthService
    container_name: auth-service
    environment:
      - SERVER_PORT=8100
      - SPRING_R2DBC_URL=r2dbc:postgresql://api-gateway-postgres:5432/AuthServiceDB
      - SPRING_R2DBC_USERNAME=postgres
      - SPRING_R2DBC_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-at-least-32-chars-long!!}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/actuator/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - api-gateway-network

  api-gateway:
    build:
      context: .
      args:
        SERVICE_PATH: ./APIGatewayService
    container_name: api-gateway
    environment:
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-at-least-32-chars-long!!}
      - SPRING_DATA_REDIS_HOST=api-gateway-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-redispass}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - api-gateway-network

  service-a:
    build:
      context: .
      args:
        SERVICE_PATH: ./ServiceA
    container_name: service-a
    environment:
      - SERVER_PORT=8081
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka
    ports:
      - "8081:8081"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - api-gateway-network

  service-b:
    build:
      context: .
      args:
        SERVICE_PATH: ./ServiceB
    container_name: service-b
    environment:
      - SERVER_PORT=8082
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka
    ports:
      - "8082:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - api-gateway-network

volumes:
  postgres_data:

networks:
  api-gateway-network:
    driver: bridge